<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ocean: #1a3a5c;
    --deep: #0d2237;
    --parchment: #f5efe0;
    --gold: #c8a84b;
    --correct: #5cb87a;

  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--deep);

    min-height: 100vh;
    display: flex;
    flex-direction: column;

  .back-link {

    padding: 0;

  h1 {

  .subtitle {

    font-size: 0.95rem;
    margin-bottom: 28px;
    text-align: center;

  /* ── Summary strip ────────────────────────────────── */
  .summary {
    display: flex;
    width: 100%;
    max-width: 520px;
    margin-bottom: 32px;
    background: var(--ocean);
    border: 2px solid #2a4a6c;

    overflow: hidden;
  }

  .summary-stat {
    flex: 1;
    text-align: center;
    padding: 14px 8px;
    border-right: 1px solid #2a4a6c;
  }
  .summary-stat:last-child { border-right: none; }

  .summary-stat .val {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    line-height: 1;
    color: var(--gold);
  }

  .summary-stat .lbl {

    font-size: 1.2rem;

  /* ── County grid ──────────────────────────────────── */
  .county-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;

  .county-card {
    background: var(--ocean);

    cursor: pointer;

  .county-card:hover { border-color: #a0b4c8; }

  .county-card.unplayed {

  .county-card.unplayed:hover { border-color: #2a4a6c; }

  .county-card .county-name {

</style>

<script>
const COUNTIES = [
  'Androscoggin','Aroostook','Cumberland','Franklin','Hancock',
  'Kennebec','Knox','Lincoln','Oxford','Penobscot',
  'Piscataquis','Sagadahoc','Somerset','Waldo','Washington','York'
];

const STATS_KEY = 'maineQuizStats';

function loadStats() {
  try { return JSON.parse(localStorage.getItem(STATS_KEY)) || { countyBest: {}, countyGames: {} }; }
  catch(e) { return { countyBest: {}, countyGames: {} }; }
}

function pctColor(p) { const t = p<=50 ? p/50 : (p-50)/50; return p<=50 ? `hsl(${Math.round(4+41*t)},${Math.round(67-14*t)}%,${Math.round(63-9*t)}%)` : `hsl(${Math.round(45+94*t)},${Math.round(53-14*t)}%,54%)`; }
// For polygon fills — anchored to --wrong (#7a2820 ≈ hsl(5,59%,30%)) at 0%
function fillColor(p) { const t = p<=50 ? p/50 : (p-50)/50; return p<=50 ? `hsl(${Math.round(5+40*t)},${Math.round(59-6*t)}%,${Math.round(47+7*t)}%)` : `hsl(${Math.round(45+94*t)},${Math.round(53-14*t)}%,54%)`; }

function gameAnswers(game) { return game.answers || game; }

function formatDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── Town filter ────────────────────────────────────────
const ALWAYS_EXCLUDE = new Set([
  'Hancock County Island','Knox County Island','Lincoln County Island',
  'Piscataquis County Island','Waldo County Island','Washington County Island',
]);
const ALWAYS_INCLUDE = new Set([
  'Matinicus Isle Plt','Monhegan Island Plt','Rangeley Plt',
  'The Forks Plt','Grand Lake Stream Plt',
]);
const NORMAL_MODE_EXCLUDE = new Set([
  'Township 6 North of Weld','Township D','Township E',
  'C Surplus','Township C',
  'Rockwood Strip T1 R1 NBKP','Rockwood Strip T2 R1 NBKP',
]);

function shouldInclude(f) {
  const name = (f.properties.TOWN || '').trim();
  if (!name) return false;
  if (f.properties.LAND === 'n') return false;
  if (ALWAYS_INCLUDE.has(name)) return true;
  if (ALWAYS_EXCLUDE.has(name)) return false;
  const upper = name.toUpperCase();
  if (/UNORG|PATENT/.test(upper)) return false;
  if (NORMAL_MODE_EXCLUDE.has(name)) return false;
  if (/WELS/.test(upper)) return false;
  if (/ TWP$| TWP | TOWNSHIP| PLT$| PLT | PLANTATION|GRANT TWP|GRANT$/.test(upper)) return false;
  if (/^T[A-Z0-9]+ R[A-Z0-9]+/.test(upper)) return false;
  if (/^T\d+\s/.test(upper)) return false;
  if (/SURPLUS$/.test(upper)) return false;
  return true;
}

// ── County → towns map (generated from GeoJSON via shouldInclude; Gores included) ──
const COUNTY_TOWNS = {
  'Androscoggin': ['Auburn','Durham','Greene','Leeds','Lewiston','Lisbon','Livermore','Livermore Falls','Mechanic Falls','Minot','Poland','Sabattus','Turner','Wales'],
  'Aroostook': ['Allagash','Amity','Ashland','Blaine','Bridgewater','Caribou','Castle Hill','Caswell','Chapman','Crystal','Dyer Brook','Eagle Lake','Easton','Fort Fairfield','Fort Kent','Frenchville','Grand Isle','Hamlin','Hammond','Haynesville','Hersey','Hodgdon','Houlton','Island Falls','Limestone','Linneus','Littleton','Ludlow','Madawaska','Mapleton','Mars Hill','Masardis','Merrill','Monticello','New Canada','New Limerick','New Sweden','Oakfield','Orient','Perham','Portage Lake','Presque Isle','Saint Agatha','Saint Francis','Sherman','Smyrna','Stockholm','Van Buren','Wade','Wallagrass','Washburn','Westfield','Westmanland','Weston','Woodland'],
  'Cumberland': ['Baldwin','Bridgton','Brunswick','Cape Elizabeth','Casco','Chebeague Island','Cumberland','Falmouth','Freeport','Frye Island','Gorham','Gray','Harpswell','Harrison','Long Island','Naples','New Gloucester','North Yarmouth','Portland','Pownal','Raymond','Scarborough','Sebago','South Portland','Standish','Westbrook','Windham','Yarmouth'],
  'Franklin': ['Avon','Carrabassett Valley','Carthage','Chesterville','Coburn Gore','Eustis','Farmington','Gorham Gore','Industry','Jay','Kingfield','Massachusetts Gore','New Sharon','New Vineyard','Phillips','Rangeley','Rangeley Plt','Strong','Temple','Weld','Wilton'],
  'Hancock': ['Amherst','Aurora','Bar Harbor','Blue Hill','Brooklin','Brooksville','Bucksport','Castine','Cranberry Isles','Dedham','Deer Isle','Eastbrook','Ellsworth','Franklin','Frenchboro','Gouldsboro','Great Pond','Hancock','Lamoine','Mariaville','Mount Desert','Orland','Osborn','Otis','Penobscot','Sedgwick','Sorrento','Southwest Harbor','Stonington','Sullivan','Surry','Swans Island','Tremont','Trenton','Verona Island','Waltham','Winter Harbor'],
  'Kennebec': ['Albion','Augusta','Belgrade','Benton','Chelsea','China','Clinton','Farmingdale','Fayette','Gardiner','Hallowell','Litchfield','Manchester','Monmouth','Mount Vernon','Oakland','Pittston','Randolph','Readfield','Rome','Sidney','Vassalboro','Vienna','Waterville','Wayne','West Gardiner','Windsor','Winslow','Winthrop'],
  'Knox': ['Appleton','Camden','Cushing','Friendship','Hope','Isle au Haut','Matinicus Isle Plt','North Haven','Owls Head','Rockland','Rockport','Saint George','South Thomaston','Thomaston','Union','Vinalhaven','Warren','Washington'],
  'Lincoln': ['Alna','Boothbay','Boothbay Harbor','Bremen','Bristol','Damariscotta','Dresden','Edgecomb','Hibberts Gore','Jefferson','Monhegan Island Plt','Newcastle','Nobleboro','Somerville','South Bristol','Southport','Waldoboro','Westport Island','Whitefield','Wiscasset'],
  'Oxford': ['Andover','Bethel','Brownfield','Buckfield','Byron','Canton','Denmark','Dixfield','Fryeburg','Gilead','Greenwood','Hanover','Hartford','Hebron','Hiram','Lovell','Mexico','Newry','Norway','Otisfield','Oxford','Paris','Peru','Porter','Roxbury','Rumford','Stoneham','Stow','Sumner','Sweden','Upton','Waterford','West Paris','Woodstock'],
  'Penobscot': ['Alton','Bangor','Bradford','Bradley','Brewer','Burlington','Carmel','Charleston','Chester','Clifton','Corinna','Corinth','Dexter','Dixmont','East Millinocket','Eddington','Edinburg','Enfield','Etna','Exeter','Garland','Glenburn','Greenbush','Hampden','Hermon','Holden','Howland','Hudson','Indian Island','Kenduskeag','Lagrange','Lakeville','Lee','Levant','Lincoln','Lowell','Mattawamkeag','Maxfield','Medway','Milford','Millinocket','Mount Chase','Newburgh','Newport','Old Town','Orono','Orrington','Passadumkeag','Patten','Plymouth','Springfield','Stacyville','Stetson','Veazie','Veazie Gore','Winn','Woodville'],
  'Piscataquis': ['Abbot','Beaver Cove','Bowerbank','Brownville','Dover-Foxcroft','Greenville','Guilford','Medford','Milo','Monson','Parkman','Sangerville','Sebec','Shirley','Wellington','Willimantic'],
  'Sagadahoc': ['Arrowsic','Bath','Bowdoin','Bowdoinham','Georgetown','Phippsburg','Richmond','Topsham','West Bath','Woolwich'],
  'Somerset': ['Anson','Athens','Bingham','Blake Gore','Cambridge','Canaan','Caratunk','Cornville','Detroit','Embden','Fairfield','Harmony','Hartland','Jackman','Madison','Mercer','Moose River','Moscow','Moxie Gore','New Portland','Norridgewock','Palmyra','Pittsfield','Ripley','Saint Albans','Skowhegan','Smithfield','Solon','Starks','The Forks Plt'],
  'Waldo': ['Belfast','Belmont','Brooks','Burnham','Frankfort','Freedom','Islesboro','Jackson','Knox','Liberty','Lincolnville','Monroe','Montville','Morrill','Northport','Palermo','Prospect','Searsmont','Searsport','Stockton Springs','Swanville','Thorndike','Troy','Unity','Waldo','Winterport'],
  'Washington': ['Addison','Alexander','Baileyville','Beals','Beddington','Calais','Charlotte','Cherryfield','Columbia','Columbia Falls','Cooper','Crawford','Cutler','Danforth','Deblois','Dennysville','East Machias','Eastport','Grand Lake Stream Plt','Harrington','Jonesboro','Jonesport','Lubec','Machias','Machiasport','Marshfield','Meddybemps','Milbridge','Northfield','Pembroke','Perry','Pleasant Point','Princeton','Robbinston','Roque Bluffs','Steuben','Talmadge','Topsfield','Vanceboro','Waite','Wesley','Whiting','Whitneyville'],
  'York': ['Acton','Alfred','Arundel','Berwick','Biddeford','Buxton','Cornish','Dayton','Eliot','Hollis','Kennebunk','Kennebunkport','Kittery','Lebanon','Limerick','Limington','Lyman','Newfield','North Berwick','Ogunquit','Old Orchard Beach','Parsonsfield','Saco','Sanford','Shapleigh','South Berwick','Waterboro','Wells','York'],
};

// Total quiz-eligible towns excluding Gores (460)
const KNOWN_TOWNS_TOTAL = 460;

// Count towns a player "knows" in a given mode.
// A town counts if: ≥75% accuracy across all plays, OR its county was perfected.
// Gores are excluded from both numerator and denominator.
function countKnownTowns(stats, mode) {
  const gamesMap = mode === 'challenge' ? (stats.challengeGames || {}) : (stats.countyGames || {});
  const perfectedCounties = mode === 'challenge'
    ? (stats.challengeUnlockedCounties || [])
    : (stats.unlockedCounties || []);

  // Build town accuracy from stored game records (last 10 per county)
  const townAccuracy = {};
  for (const games of Object.values(gamesMap)) {
    for (const game of games) {
      for (const { town, correct } of gameAnswers(game)) {
        if (!townAccuracy[town]) townAccuracy[town] = { seen: 0, correct: 0 };
        townAccuracy[town].seen++;
        if (correct) townAccuracy[town].correct++;
      }
    }
  }

  const known = new Set();

  for (const [town, s] of Object.entries(townAccuracy)) {
    if (/gore$/i.test(town)) continue;
    if (s.seen > 0 && Math.round(s.correct / s.seen * 100) >= 75) known.add(town);
  }

  for (const county of perfectedCounties) {
    for (const town of (COUNTY_TOWNS[county] || [])) {
      if (!/gore$/i.test(town)) known.add(town);
    }
  }

  return known.size;
}

// ── Summary strip ──────────────────────────────────────
function buildSummary(stats, mode) {
  const isChallenge = mode === 'challenge';
  const bestMap = isChallenge ? (stats.challengeBest || {}) : (stats.countyBest || {});
  const gamesMap = isChallenge ? (stats.challengeGames || {}) : (stats.countyGames || {});
  const gameCountMap = isChallenge ? (stats.challengeGameCount || {}) : (stats.countyGameCount || {});

  const played = Object.keys(bestMap).length;
  const totalGames = Object.keys(bestMap).reduce((s, c) =>
    s + (gameCountMap[c] || (gamesMap[c] || []).length), 0);
  const perfected = isChallenge
    ? Object.keys(bestMap).filter(c => bestMap[c] === 100).length
    : (stats.unlockedCounties || []).length;

  let totalSeen = 0, totalCorrect = 0;
  for (const games of Object.values(gamesMap)) {
    for (const game of games) {
      for (const { correct } of gameAnswers(game)) {
        totalSeen++;
        if (correct) totalCorrect++;
      }
    }
  }
  const overallPct = totalSeen ? Math.round((totalCorrect / totalSeen) * 100) : null;
  const overallColor = overallPct !== null ? pctColor(overallPct) : 'var(--gold)';

  document.getElementById('summary').innerHTML = `
    <div class="summary-stat">
      <div class="val">${played}</div>
      <div class="lbl">Counties Tried</div>
    </div>
    <div class="summary-stat">
      <div class="val">${totalGames}</div>
      <div class="lbl">Games Played</div>
    </div>
    <div class="summary-stat">
      <div class="val" style="color:${overallColor}">${overallPct !== null ? overallPct + '%' : '—'}</div>
      <div class="lbl">Overall Accuracy</div>
    </div>
    <div class="summary-stat">
      <div class="val">${perfected}</div>
      <div class="lbl">Perfected</div>
    </div>
  `;
}

// ── County grid ────────────────────────────────────────
function buildCountyGrid(stats, mode) {
  const isChallenge = mode === 'challenge';
  const bestMap = isChallenge ? (stats.challengeBest || {}) : (stats.countyBest || {});
  const gamesMap = isChallenge ? (stats.challengeGames || {}) : (stats.countyGames || {});
  const gameCountMap = isChallenge ? (stats.challengeGameCount || {}) : (stats.countyGameCount || {});
  const unlocked = new Set(stats.unlockedCounties || []);
  document.getElementById('county-grid').innerHTML = COUNTIES.map(county => {
    const best = bestMap[county];
    const gameCount = (gameCountMap[county]) || (gamesMap[county] || []).length;
    const played = best !== undefined;
    const badge = !isChallenge && unlocked.has(county) ? '<span class="unlock-badge" title="Challenge mode unlocked">⭐</span>' : '';
    const scoreStyle = played ? `color:${pctColor(best)}` : '';
    const gamesLabel = !played ? 'Not yet played' : gameCount === 1 ? '1 game' : `${gameCount} games`;
    return `
      <div class="county-card${played ? '' : ' unplayed'}" ${played ? `onclick="showCounty('${county}')"` : ''}>
        ${badge}
        <div class="county-name">${county}</div>
        <div class="county-score" style="${scoreStyle}">${played ? best + '%' : '—'}</div>
        <div class="county-games">${gamesLabel}</div>
      </div>
    `;
  }).join('');
}

// ── View switching ─────────────────────────────────────
let currentCounty = null;
let currentMode = 'normal';   // county detail mode
let mainMode = 'normal';      // main view mode

function setMainMode(mode) {
  mainMode = mode;
  document.getElementById('main-toggle-normal').classList.toggle('active', mode === 'normal');
  document.getElementById('main-toggle-challenge').classList.toggle('active', mode === 'challenge');
  const stats = loadStats();
  buildSummary(stats, mode);
  buildCountyGrid(stats, mode);
  buildTracker(stats, mode);
}

function buildTracker(stats, mode) {
  const known = countKnownTowns(stats, mode);
  const pct = Math.round(known / KNOWN_TOWNS_TOTAL * 100);
  const tracker = document.getElementById('town-tracker');
  const gameCountMap = mode === 'challenge' ? (stats.challengeGameCount || {}) : (stats.countyGameCount || {});
  if (Object.keys(gameCountMap).length === 0) {
    tracker.style.display = 'none';
    return;
  }
  tracker.style.display = 'block';
  document.getElementById('tracker-label').textContent = `${known} of ${KNOWN_TOWNS_TOTAL} Maine towns`;
  document.getElementById('tracker-bar').style.width = pct + '%';
}

function showMain() {
  document.getElementById('main-view').style.display = 'flex';
  document.getElementById('county-view').style.display = 'none';
  hideTip();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('toggle-normal').classList.toggle('active', mode === 'normal');
  document.getElementById('toggle-challenge').classList.toggle('active', mode === 'challenge');
  renderCountyDetail(currentCounty);
}

async function showCounty(county) {
  currentCounty = county;
  currentMode = 'normal';
  document.getElementById('toggle-normal').classList.add('active');
  document.getElementById('toggle-challenge').classList.remove('active');

  document.getElementById('main-view').style.display = 'none';
  document.getElementById('county-view').style.display = 'flex';
  document.querySelector('#county-view a.btn-outline').href = `index.html?county=${encodeURIComponent(county)}`;
  window.scrollTo(0, 0);

  const stats = loadStats();
  const unlocked = (stats.unlockedCounties || []).includes(county);

  // Show toggle only if challenge mode is unlocked for this county
  document.getElementById('cv-toggle').style.display = unlocked ? 'flex' : 'none';

  document.getElementById('cv-title').textContent = county + ' County';

  await renderCountyDetail(county);
}

async function renderCountyDetail(county) {
  const stats = loadStats();
  const isChallenge = currentMode === 'challenge';
  const best = isChallenge ? (stats.challengeBest || {})[county] : stats.countyBest[county];
  const gameCount = isChallenge
    ? ((stats.challengeGameCount || {})[county] || ((stats.challengeGames || {})[county] || []).length)
    : ((stats.countyGameCount || {})[county] || (stats.countyGames[county] || []).length);
  const games = isChallenge
    ? ((stats.challengeGames || {})[county] || [])
    : (stats.countyGames[county] || []);

  // Mini-summary
  let totalSeen = 0, totalCorrect = 0;
  for (const game of games) {
    for (const { correct } of gameAnswers(game)) {
      totalSeen++;
      if (correct) totalCorrect++;
    }
  }
  const overallPct = totalSeen ? Math.round((totalCorrect / totalSeen) * 100) : null;

  document.getElementById('cv-summary').innerHTML = `
    <div class="summary-stat">
      <div class="val" style="color:${best !== undefined ? pctColor(best) : '#4a6a8a'}">${best !== undefined ? best + '%' : '—'}</div>
      <div class="lbl">Best Score</div>
    </div>
    <div class="summary-stat">
      <div class="val">${gameCount || '—'}</div>
      <div class="lbl">${games.length === 1 ? 'Game' : 'Games'} Played</div>
    </div>
    <div class="summary-stat">
      <div class="val" style="color:${overallPct !== null ? pctColor(overallPct) : '#4a6a8a'}">${overallPct !== null ? overallPct + '%' : '—'}</div>
      <div class="lbl">Overall Accuracy</div>
    </div>
  `;

  // Progress chart
  buildGameChart(games);

  // Town accuracy map for heat map
  const townMap = {};
  for (const game of games) {
    for (const { town, correct } of gameAnswers(game)) {
      if (!townMap[town]) townMap[town] = { seen: 0, correct: 0 };
      townMap[town].seen++;
      if (correct) townMap[town].correct++;
    }
  }

  document.getElementById('cv-missed').innerHTML = '';
  await buildCountyMap(county, townMap);
}

// ── Progress chart ─────────────────────────────────────
function buildGameChart(games) {
  const el = document.getElementById('cv-chart');
  el.innerHTML = '';
  if (!games.length) return;

  const data = games.map((game, i) => {
    const answers = gameAnswers(game);
    if (!answers.length) return null;
    const correct = answers.filter(a => a.correct).length;
    const pct = Math.round((correct / answers.length) * 100);
    const label = game.ts
      ? new Date(game.ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : `Game ${i + 1}`;
    return { pct, label };
  }).filter(Boolean);

  const titleDiv = document.createElement('div');
  titleDiv.className = 'detail-section-title';
  titleDiv.style.marginTop = '8px';
  titleDiv.textContent = 'Score History';
  el.appendChild(titleDiv);

  const margin = { top: 28, right: 16, bottom: 36, left: 36 };
  const totalW = el.clientWidth || 480;
  const totalH = 180;
  const w = totalW - margin.left - margin.right;
  const h = totalH - margin.top - margin.bottom;

  const svg = d3.select('#cv-chart')
    .append('svg')
    .attr('width', totalW)
    .attr('height', totalH)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

  const x = d3.scalePoint()
    .domain(data.map((_, i) => i))
    .range([0, w])
    .padding(0.5);

  const y = d3.scaleLinear().domain([0, 100]).range([h, 0]);

  // Grid lines
  [25, 50, 75, 100].forEach(v => {
    svg.append('line')
      .attr('x1', 0).attr('x2', w)
      .attr('y1', y(v)).attr('y2', y(v))
      .attr('stroke', '#1e3550').attr('stroke-width', 1);
    svg.append('text')
      .attr('x', -6).attr('y', y(v)).attr('dy', '0.35em')
      .attr('text-anchor', 'end')
      .attr('fill', '#a0b4c8').attr('font-size', 10)
      .text(v + '%');
  });

  // Connecting line
  if (data.length > 1) {
    svg.append('path')
      .datum(data)
      .attr('fill', 'none')
      .attr('stroke', '#a0b4c8')
      .attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '4,3')
      .attr('d', d3.line().x((_, i) => x(i)).y(d => y(d.pct)));
  }

  // Dots
  svg.selectAll('.dot')
    .data(data)
    .enter().append('circle')
    .attr('cx', (_, i) => x(i))
    .attr('cy', d => y(d.pct))
    .attr('r', 7)
    .attr('fill', d => pctColor(d.pct))
    .attr('stroke', 'var(--deep)')
    .attr('stroke-width', 2);

  // Score labels above dots
  svg.selectAll('.score-lbl')
    .data(data)
    .enter().append('text')
    .attr('x', (_, i) => x(i))
    .attr('y', d => y(d.pct) - 13)
    .attr('text-anchor', 'middle')
    .attr('fill', d => pctColor(d.pct))
    .attr('font-size', 11)
    .attr('font-family', 'Playfair Display, Georgia, serif')
    .attr('font-weight', 'bold')
    .text(d => d.pct + '%');

  // X-axis date labels
  svg.selectAll('.x-lbl')
    .data(data)
    .enter().append('text')
    .attr('x', (_, i) => x(i))
    .attr('y', h + 20)
    .attr('text-anchor', 'middle')
    .attr('fill', '#a0b4c8')
    .attr('font-size', 10)
    .text(d => d.label);
}

// ── County heat map ────────────────────────────────────
const isTouch = window.matchMedia('(hover: none)').matches;

async function buildCountyMap(county, townMap) {
  const statusEl = document.getElementById('county-map-status');
  const svgEl = document.getElementById('county-map-svg');
  statusEl.style.display = 'block';
  svgEl.innerHTML = '';

  // Reset label
  const labelEl = document.getElementById('county-map-label');
  document.getElementById('lbl-town').textContent = '';
  document.getElementById('lbl-detail').textContent = isTouch ? 'Tap a town to see your accuracy' : '';

  try {
    const geo = await fetch(`${county.toLowerCase()}.geojson`).then(r => r.json());
    const allLandFeatures = geo.features.filter(f => f.properties.LAND === 'y');
    const features = geo.features.filter(shouldInclude);

    statusEl.style.display = 'none';

    const width = svgEl.parentElement.clientWidth || 480;
    const maxHeight = Math.round(width * 0.85);
    const pad = 16;
    const fitFeatures = allLandFeatures.length ? allLandFeatures : features;
    const fc = { type: 'FeatureCollection', features: fitFeatures };
    const projection = d3.geoMercator().fitExtent([[pad, pad], [width - pad, maxHeight - pad]], fc);
    const bounds = d3.geoPath().projection(projection).bounds(fc);
    const height = Math.ceil(bounds[1][1] - bounds[0][1]) + pad * 2;

    svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);
    svgEl.removeAttribute('height');

    const pathGen = d3.geoPath().projection(projection);
    const svg = d3.select('#county-map-svg');

    svg.append('rect').attr('width', width).attr('height', height).attr('fill', '#0d2237');

    svg.append('g').selectAll('.county-bg')
      .data(allLandFeatures).enter().append('path')
      .attr('class', 'county-bg').attr('d', pathGen)
      .attr('fill', '#3a5c3c').attr('stroke', 'none').attr('pointer-events', 'none');

    svg.selectAll('.town-heat')
      .data(features)
      .enter().append('path')
      .attr('class', 'town-heat')
      .attr('d', pathGen)
      .attr('fill', d => {
        const a = townMap[d.properties.TOWN];
        if (!a) return '#4e6e50';
        return fillColor(Math.round((a.correct / a.seen) * 100));
      })
      .attr('stroke', '#7B9E7D')
      .attr('stroke-width', 0.8)
      .on('mousemove', !isTouch ? (event, d) => showTip(event, d, townMap) : null)
      .on('mouseleave', !isTouch ? hideTip : null)
      .on('click', isTouch ? (_, d) => showLabel(d, townMap) : null);

  } catch(err) {
    statusEl.textContent = 'Could not load map.';
    console.error(err);
  }
}

// ── Tooltip & label ────────────────────────────────────
function tipContent(town, townMap) {
  const a = townMap[town];
  if (!a) return { detail: 'Not yet played', color: 'var(--parchment)' };
  const pct = Math.round((a.correct / a.seen) * 100);
  return { detail: `${pct}% accurate (${a.correct}/${a.seen} correct)`, color: pctColor(pct) };
}

function showTip(event, d, townMap) {
  const town = d.properties.TOWN;
  const { detail, color } = tipContent(town, townMap);
  document.getElementById('tip-town').textContent = town;
  document.getElementById('tip-detail').innerHTML = `<span style="color:${color}">${detail}</span>`;
  const tip = document.getElementById('map-tip');
  tip.style.display = 'block';
  tip.style.left = (event.clientX + 14) + 'px';
  tip.style.top  = (event.clientY - 10) + 'px';
}

function hideTip() {
  document.getElementById('map-tip').style.display = 'none';
}

function showLabel(d, townMap) {
  const town = d.properties.TOWN;
  const { detail, color } = tipContent(town, townMap);
  const townEl = document.getElementById('lbl-town');
  townEl.textContent = town;
  townEl.style.color = color;
  document.getElementById('lbl-detail').textContent = detail;
}

// ── Init ───────────────────────────────────────────────
const stats = loadStats();
if ((stats.unlockedCounties || []).length > 0) {
  document.getElementById('main-toggle').style.display = 'flex';
}
buildSummary(stats, mainMode);
buildCountyGrid(stats, mainMode);
buildTracker(stats, mainMode);
</script>
