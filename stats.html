<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Progress — Maine Town Quiz</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script async src="https://plausible.io/js/pa-DKzRWAziU2jErmALNhWWs.js"></script>
<script>window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};plausible.init()</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ocean: #1a3a5c;
    --deep: #0d2237;
    --parchment: #f5efe0;
    --gold: #c8a84b;
    --correct: #5cb87a;
  }

  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--deep);
    color: var(--parchment);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  .back-link {
    font-size: 1rem;
    color: #a0b4c8;
    text-decoration: none;
    margin-bottom: 16px;
    align-self: flex-start;
    display: inline-block;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    padding: 0;
  }
  .back-link:hover { color: var(--gold); }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: var(--gold);
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }

  .subtitle {
    font-style: italic;
    color: #a0b4c8;
    font-size: 0.95rem;
    margin-bottom: 28px;
    text-align: center;
  }

  /* ── Summary strip ────────────────────────────────── */
  .summary {
    display: flex;
    width: 100%;
    max-width: 520px;
    margin-bottom: 32px;
    background: var(--ocean);
    border: 2px solid #2a4a6c;
    border-radius: 8px;
    overflow: hidden;
  }

  .summary-stat {
    flex: 1;
    text-align: center;
    padding: 14px 8px;
    border-right: 1px solid #2a4a6c;
  }
  .summary-stat:last-child { border-right: none; }

  .summary-stat .val {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    line-height: 1;
    color: var(--gold);
  }

  .summary-stat .lbl {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a0b4c8;
    margin-top: 4px;
  }

  /* ── Section title ────────────────────────────────── */
  .section-title {
    font-family: 'Playfair Display', Georgia, serif;
    color: var(--gold);
    font-size: 1.2rem;
    font-weight: 400;
    margin-bottom: 12px;
    text-align: center;
    width: 100%;
    max-width: 520px;
  }

  /* ── County grid ──────────────────────────────────── */
  .county-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    width: 100%;
    max-width: 520px;
    margin-bottom: 36px;
  }

  .county-card {
    background: var(--ocean);
    border: 2px solid #2a4a6c;
    border-radius: 8px;
    padding: 12px 10px;
    text-align: center;
    position: relative;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .county-card:hover { border-color: #a0b4c8; }

  .county-card.unplayed {
    opacity: 0.45;
    cursor: default;
  }
  .county-card.unplayed:hover { border-color: #2a4a6c; }

  .county-card .county-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 0.9rem;
    color: var(--parchment);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .county-card .county-score {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 2rem;
    line-height: 1;
    margin-bottom: 4px;
    color: #4a6a8a;
  }

  .county-card .county-games {
    font-size: 0.75rem;
    color: #a0b4c8;
  }

  .unlock-badge {
    position: absolute;
    top: 5px;
    right: 7px;
    font-size: 0.8rem;
  }

  /* ── Mode toggle ──────────────────────────────────── */
  .mode-toggle {
    display: flex;
    gap: 0;
    background: var(--ocean);
    border: 2px solid #2a4a6c;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
    width: 100%;
    max-width: 260px;
  }
  .toggle-btn {
    flex: 1;
    padding: 8px 0;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 0.95rem;
    background: none;
    border: none;
    color: #a0b4c8;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .toggle-btn.active {
    background: #2a4a6c;
    color: var(--parchment);
  }
  .toggle-btn:not(.active):hover { color: var(--parchment); }

  /* ── County detail view ───────────────────────────── */
  #county-view {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 520px;
  }

  #county-view h2 {
    font-family: 'Playfair Display', Georgia, serif;
    color: var(--gold);
    font-size: clamp(1.4rem, 5vw, 2rem);
    text-align: center;
    margin-bottom: 20px;
  }

  /* Mini summary for county */
  .county-summary {
    display: flex;
    width: 100%;
    margin-bottom: 24px;
    background: var(--ocean);
    border: 2px solid #2a4a6c;
    border-radius: 8px;
    overflow: hidden;
  }

  /* Heat map container */
  #county-map-wrap {
    width: 100%;
    background: var(--ocean);
    border: 4px solid #a0b4c8;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  #county-map-svg { width: 100%; display: block; }
  #county-map-status {
    color: #a0b4c8;
    font-style: italic;
    text-align: center;
    padding: 40px 0;
  }

  /* Touch / hover label under map */
  #county-map-label {
    text-align: center;
    margin-bottom: 4px;
  }
  #county-map-label .lbl-town {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.1rem;
  }
  #county-map-label .lbl-detail {
    font-size: 0.85rem;
    color: #a0b4c8;
  }

  /* Tooltip (desktop hover) */
  #map-tip {
    position: fixed;
    pointer-events: none;
    display: none;
    background: rgba(13,34,55,0.95);
    border: 1px solid #2a4a6c;
    border-radius: 6px;
    padding: 7px 12px;
    z-index: 200;
  }
  #tip-town {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1rem;
    color: var(--parchment);
  }
  #tip-detail { font-size: 0.85rem; color: #a0b4c8; margin-top: 1px; }

  /* Recent games + most missed */
  .detail-section-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #a0b4c8;
    margin-bottom: 8px;
    margin-top: 24px;
    width: 100%;
  }

  /* ── Progress chart ───────────────────────────────── */
  #cv-chart {
    width: 100%;
    margin-bottom: 4px;
  }
  #cv-chart svg { width: 100%; display: block; overflow: visible; }

  .stat-row, .game-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    font-size: 1.1rem;
    border-bottom: 1px solid #1e3550;
    width: 100%;
  }
  .game-row:last-child, .stat-row:last-child { border-bottom: none; }

  .game-date { font-size: 0.8rem; color: #a0b4c8; }
  .game-score { font-family: 'Playfair Display', Georgia, serif; }
  .stat-pct {
    font-family: 'Playfair Display', Georgia, serif;
    margin-left: 12px;
    white-space: nowrap;
  }

  .btn {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 28px;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1rem;
    font-weight: 700;
    background: var(--gold);
    color: var(--deep);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
  }
  .btn:hover { background: #dfc060; }
  .btn-outline {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
  }
  .btn-outline:hover { background: rgba(200,168,75,0.1); }
</style>
</head>
<body>

<!-- ── Main view ──────────────────────────────────────── -->
<div id="main-view" style="display:flex; flex-direction:column; align-items:center; width:100%;">
  <h1>Your Progress</h1>
  <p class="subtitle">Maine Town Quiz</p>

  <div class="summary" id="summary"></div>

  <div class="section-title">Counties</div>
  <div class="county-grid" id="county-grid"></div>

</div>

<!-- ── County detail view ─────────────────────────────── -->
<div id="county-view">
  <h2 id="cv-title"></h2>
  <div class="mode-toggle" id="cv-toggle">
    <button id="toggle-normal" class="toggle-btn active" onclick="setMode('normal')">Normal</button>
    <button id="toggle-challenge" class="toggle-btn" onclick="setMode('challenge')">Challenge</button>
  </div>
  <div class="county-summary" id="cv-summary"></div>

  <div id="county-map-wrap">
    <div id="county-map-status">Loading map…</div>
    <svg id="county-map-svg"></svg>
  </div>
  <div id="county-map-label">
    <div class="lbl-town" id="lbl-town"></div>
    <div class="lbl-detail" id="lbl-detail"></div>
  </div>

  <div id="cv-chart"></div>
  <div id="cv-missed"></div>

  <div style="display:flex; flex-direction:row; justify-content:center; gap:10px; margin-top:16px; width:100%;">
    <button class="btn" onclick="showMain()">All Counties</button>
    <a href="index.html" class="btn btn-outline">Go to Quiz</a>
  </div>
</div>

<!-- Tooltip (desktop) -->
<div id="map-tip">
  <div id="tip-town"></div>
  <div id="tip-detail"></div>
</div>

<script>
const COUNTIES = [
  'Androscoggin','Aroostook','Cumberland','Franklin','Hancock',
  'Kennebec','Knox','Lincoln','Oxford','Penobscot',
  'Piscataquis','Sagadahoc','Somerset','Waldo','Washington','York'
];

const STATS_KEY = 'maineQuizStats';

function loadStats() {
  try { return JSON.parse(localStorage.getItem(STATS_KEY)) || { countyBest: {}, countyGames: {} }; }
  catch(e) { return { countyBest: {}, countyGames: {} }; }
}

function pctColor(p) { const t = p<=50 ? p/50 : (p-50)/50; return p<=50 ? `hsl(${Math.round(4+41*t)},${Math.round(67-14*t)}%,${Math.round(63-9*t)}%)` : `hsl(${Math.round(45+94*t)},${Math.round(53-14*t)}%,54%)`; }
// For polygon fills — anchored to --wrong (#7a2820 ≈ hsl(5,59%,30%)) at 0%
function fillColor(p) { const t = p<=50 ? p/50 : (p-50)/50; return p<=50 ? `hsl(${Math.round(5+40*t)},${Math.round(59-6*t)}%,${Math.round(47+7*t)}%)` : `hsl(${Math.round(45+94*t)},${Math.round(53-14*t)}%,54%)`; }

function gameAnswers(game) { return game.answers || game; }

function formatDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── Town filter ────────────────────────────────────────
const ALWAYS_EXCLUDE = new Set([
  'Hancock County Island','Knox County Island','Lincoln County Island',
  'Piscataquis County Island','Waldo County Island','Washington County Island',
]);
const ALWAYS_INCLUDE = new Set([
  'Matinicus Isle Plt','Monhegan Island Plt','Rangeley Plt',
  'The Forks Plt','Grand Lake Stream Plt',
]);
const NORMAL_MODE_EXCLUDE = new Set([
  'Township 6 North of Weld','Township D','Township E',
  'C Surplus','Township C',
  'Rockwood Strip T1 R1 NBKP','Rockwood Strip T2 R1 NBKP',
]);

function shouldInclude(f) {
  const name = (f.properties.TOWN || '').trim();
  if (!name) return false;
  if (f.properties.LAND === 'n') return false;
  if (ALWAYS_INCLUDE.has(name)) return true;
  if (ALWAYS_EXCLUDE.has(name)) return false;
  const upper = name.toUpperCase();
  if (/UNORG|PATENT/.test(upper)) return false;
  if (NORMAL_MODE_EXCLUDE.has(name)) return false;
  if (/WELS/.test(upper)) return false;
  if (/ TWP$| TWP | TOWNSHIP| PLT$| PLT | PLANTATION|GRANT TWP|GRANT$/.test(upper)) return false;
  if (/^T[A-Z0-9]+ R[A-Z0-9]+/.test(upper)) return false;
  if (/^T\d+\s/.test(upper)) return false;
  if (/SURPLUS$/.test(upper)) return false;
  return true;
}

// ── Summary strip ──────────────────────────────────────
function buildSummary(stats) {
  const played = Object.keys(stats.countyBest).length;
  const countyGameCount = stats.countyGameCount || {};
  const challengeGameCount = stats.challengeGameCount || {};
  const totalGames = Object.keys(stats.countyBest || {}).reduce((s, c) =>
      s + (countyGameCount[c] || (stats.countyGames[c] || []).length), 0)
    + Object.keys(stats.challengeBest || {}).reduce((s, c) =>
      s + (challengeGameCount[c] || ((stats.challengeGames || {})[c] || []).length), 0);
  const perfected = (stats.unlockedCounties || []).length;

  let totalSeen = 0, totalCorrect = 0;
  for (const games of Object.values(stats.countyGames || {})) {
    for (const game of games) {
      for (const { correct } of gameAnswers(game)) {
        totalSeen++;
        if (correct) totalCorrect++;
      }
    }
  }
  const overallPct = totalSeen ? Math.round((totalCorrect / totalSeen) * 100) : null;
  const overallColor = overallPct !== null ? pctColor(overallPct) : 'var(--gold)';

  document.getElementById('summary').innerHTML = `
    <div class="summary-stat">
      <div class="val">${played}</div>
      <div class="lbl">Counties Tried</div>
    </div>
    <div class="summary-stat">
      <div class="val">${totalGames}</div>
      <div class="lbl">Games Played</div>
    </div>
    <div class="summary-stat">
      <div class="val" style="color:${overallColor}">${overallPct !== null ? overallPct + '%' : '—'}</div>
      <div class="lbl">Overall Accuracy</div>
    </div>
    <div class="summary-stat">
      <div class="val">${perfected}</div>
      <div class="lbl">Perfected</div>
    </div>
  `;
}

// ── County grid ────────────────────────────────────────
function buildCountyGrid(stats) {
  const unlocked = new Set(stats.unlockedCounties || []);
  document.getElementById('county-grid').innerHTML = COUNTIES.map(county => {
    const best = stats.countyBest[county];
    const gameCount = (stats.countyGameCount || {})[county] || (stats.countyGames[county] || []).length;
    const played = best !== undefined;
    const badge = unlocked.has(county) ? '<span class="unlock-badge" title="Challenge mode unlocked">⭐</span>' : '';
    const scoreStyle = played ? `color:${pctColor(best)}` : '';
    const gamesLabel = !played ? 'Not yet played' : gameCount === 1 ? '1 game' : `${gameCount} games`;
    return `
      <div class="county-card${played ? '' : ' unplayed'}" ${played ? `onclick="showCounty('${county}')"` : ''}>
        ${badge}
        <div class="county-name">${county}</div>
        <div class="county-score" style="${scoreStyle}">${played ? best + '%' : '—'}</div>
        <div class="county-games">${gamesLabel}</div>
      </div>
    `;
  }).join('');
}

// ── View switching ─────────────────────────────────────
let currentCounty = null;
let currentMode = 'normal'; // 'normal' | 'challenge'

function showMain() {
  document.getElementById('main-view').style.display = 'flex';
  document.getElementById('county-view').style.display = 'none';
  hideTip();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('toggle-normal').classList.toggle('active', mode === 'normal');
  document.getElementById('toggle-challenge').classList.toggle('active', mode === 'challenge');
  renderCountyDetail(currentCounty);
}

async function showCounty(county) {
  currentCounty = county;
  currentMode = 'normal';
  document.getElementById('toggle-normal').classList.add('active');
  document.getElementById('toggle-challenge').classList.remove('active');

  document.getElementById('main-view').style.display = 'none';
  document.getElementById('county-view').style.display = 'flex';
  document.querySelector('#county-view a.btn-outline').href = `index.html?county=${encodeURIComponent(county)}`;
  window.scrollTo(0, 0);

  const stats = loadStats();
  const unlocked = (stats.unlockedCounties || []).includes(county);

  // Show toggle only if challenge data exists
  const hasChallenge = (stats.challengeGames || {})[county]?.length > 0 || (stats.challengeBest || {})[county] !== undefined;
  document.getElementById('cv-toggle').style.display = hasChallenge ? 'flex' : 'none';

  document.getElementById('cv-title').textContent = county + ' County';

  await renderCountyDetail(county);
}

async function renderCountyDetail(county) {
  const stats = loadStats();
  const isChallenge = currentMode === 'challenge';
  const best = isChallenge ? (stats.challengeBest || {})[county] : stats.countyBest[county];
  const gameCount = isChallenge
    ? ((stats.challengeGameCount || {})[county] || ((stats.challengeGames || {})[county] || []).length)
    : ((stats.countyGameCount || {})[county] || (stats.countyGames[county] || []).length);
  const games = isChallenge
    ? ((stats.challengeGames || {})[county] || [])
    : (stats.countyGames[county] || []);

  // Mini-summary
  let totalSeen = 0, totalCorrect = 0;
  for (const game of games) {
    for (const { correct } of gameAnswers(game)) {
      totalSeen++;
      if (correct) totalCorrect++;
    }
  }
  const overallPct = totalSeen ? Math.round((totalCorrect / totalSeen) * 100) : null;

  document.getElementById('cv-summary').innerHTML = `
    <div class="summary-stat">
      <div class="val" style="color:${best !== undefined ? pctColor(best) : '#4a6a8a'}">${best !== undefined ? best + '%' : '—'}</div>
      <div class="lbl">Best Score</div>
    </div>
    <div class="summary-stat">
      <div class="val">${gameCount || '—'}</div>
      <div class="lbl">${games.length === 1 ? 'Game' : 'Games'} Played</div>
    </div>
    <div class="summary-stat">
      <div class="val" style="color:${overallPct !== null ? pctColor(overallPct) : '#4a6a8a'}">${overallPct !== null ? overallPct + '%' : '—'}</div>
      <div class="lbl">Overall Accuracy</div>
    </div>
  `;

  // Progress chart
  buildGameChart(games);

  // Town accuracy map for heat map
  const townMap = {};
  for (const game of games) {
    for (const { town, correct } of gameAnswers(game)) {
      if (!townMap[town]) townMap[town] = { seen: 0, correct: 0 };
      townMap[town].seen++;
      if (correct) townMap[town].correct++;
    }
  }

  document.getElementById('cv-missed').innerHTML = '';
  await buildCountyMap(county, townMap);
}

// ── Progress chart ─────────────────────────────────────
function buildGameChart(games) {
  const el = document.getElementById('cv-chart');
  el.innerHTML = '';
  if (!games.length) return;

  const data = games.map((game, i) => {
    const answers = gameAnswers(game);
    const correct = answers.filter(a => a.correct).length;
    const pct = Math.round((correct / answers.length) * 100);
    const label = game.ts
      ? new Date(game.ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      : `Game ${i + 1}`;
    return { pct, label };
  });

  const titleDiv = document.createElement('div');
  titleDiv.className = 'detail-section-title';
  titleDiv.style.marginTop = '8px';
  titleDiv.textContent = 'Score History';
  el.appendChild(titleDiv);

  const margin = { top: 28, right: 16, bottom: 36, left: 36 };
  const totalW = el.clientWidth || 480;
  const totalH = 180;
  const w = totalW - margin.left - margin.right;
  const h = totalH - margin.top - margin.bottom;

  const svg = d3.select('#cv-chart')
    .append('svg')
    .attr('width', totalW)
    .attr('height', totalH)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

  const x = d3.scalePoint()
    .domain(data.map((_, i) => i))
    .range([0, w])
    .padding(0.5);

  const y = d3.scaleLinear().domain([0, 100]).range([h, 0]);

  // Grid lines
  [25, 50, 75, 100].forEach(v => {
    svg.append('line')
      .attr('x1', 0).attr('x2', w)
      .attr('y1', y(v)).attr('y2', y(v))
      .attr('stroke', '#1e3550').attr('stroke-width', 1);
    svg.append('text')
      .attr('x', -6).attr('y', y(v)).attr('dy', '0.35em')
      .attr('text-anchor', 'end')
      .attr('fill', '#a0b4c8').attr('font-size', 10)
      .text(v + '%');
  });

  // Connecting line
  if (data.length > 1) {
    svg.append('path')
      .datum(data)
      .attr('fill', 'none')
      .attr('stroke', '#a0b4c8')
      .attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '4,3')
      .attr('d', d3.line().x((_, i) => x(i)).y(d => y(d.pct)));
  }

  // Dots
  svg.selectAll('.dot')
    .data(data)
    .enter().append('circle')
    .attr('cx', (_, i) => x(i))
    .attr('cy', d => y(d.pct))
    .attr('r', 7)
    .attr('fill', d => pctColor(d.pct))
    .attr('stroke', 'var(--deep)')
    .attr('stroke-width', 2);

  // Score labels above dots
  svg.selectAll('.score-lbl')
    .data(data)
    .enter().append('text')
    .attr('x', (_, i) => x(i))
    .attr('y', d => y(d.pct) - 13)
    .attr('text-anchor', 'middle')
    .attr('fill', d => pctColor(d.pct))
    .attr('font-size', 11)
    .attr('font-family', 'Playfair Display, Georgia, serif')
    .attr('font-weight', 'bold')
    .text(d => d.pct + '%');

  // X-axis date labels
  svg.selectAll('.x-lbl')
    .data(data)
    .enter().append('text')
    .attr('x', (_, i) => x(i))
    .attr('y', h + 20)
    .attr('text-anchor', 'middle')
    .attr('fill', '#a0b4c8')
    .attr('font-size', 10)
    .text(d => d.label);
}

// ── County heat map ────────────────────────────────────
const isTouch = window.matchMedia('(hover: none)').matches;

async function buildCountyMap(county, townMap) {
  const statusEl = document.getElementById('county-map-status');
  const svgEl = document.getElementById('county-map-svg');
  statusEl.style.display = 'block';
  svgEl.innerHTML = '';

  // Reset label
  const labelEl = document.getElementById('county-map-label');
  document.getElementById('lbl-town').textContent = '';
  document.getElementById('lbl-detail').textContent = isTouch ? 'Tap a town to see your accuracy' : '';

  try {
    const geo = await fetch(`${county.toLowerCase()}.geojson`).then(r => r.json());
    const allLandFeatures = geo.features.filter(f => f.properties.LAND === 'y');
    const features = geo.features.filter(shouldInclude);

    statusEl.style.display = 'none';

    const width = svgEl.parentElement.clientWidth || 480;
    const maxHeight = Math.round(width * 0.85);
    const pad = 16;
    const fitFeatures = allLandFeatures.length ? allLandFeatures : features;
    const fc = { type: 'FeatureCollection', features: fitFeatures };
    const projection = d3.geoMercator().fitExtent([[pad, pad], [width - pad, maxHeight - pad]], fc);
    const bounds = d3.geoPath().projection(projection).bounds(fc);
    const height = Math.ceil(bounds[1][1] - bounds[0][1]) + pad * 2;

    svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);
    svgEl.removeAttribute('height');

    const pathGen = d3.geoPath().projection(projection);
    const svg = d3.select('#county-map-svg');

    svg.append('rect').attr('width', width).attr('height', height).attr('fill', '#0d2237');

    svg.append('g').selectAll('.county-bg')
      .data(allLandFeatures).enter().append('path')
      .attr('class', 'county-bg').attr('d', pathGen)
      .attr('fill', '#3a5c3c').attr('stroke', 'none').attr('pointer-events', 'none');

    svg.selectAll('.town-heat')
      .data(features)
      .enter().append('path')
      .attr('class', 'town-heat')
      .attr('d', pathGen)
      .attr('fill', d => {
        const a = townMap[d.properties.TOWN];
        if (!a) return '#4e6e50';
        return fillColor(Math.round((a.correct / a.seen) * 100));
      })
      .attr('stroke', '#7B9E7D')
      .attr('stroke-width', 0.8)
      .on('mousemove', !isTouch ? (event, d) => showTip(event, d, townMap) : null)
      .on('mouseleave', !isTouch ? hideTip : null)
      .on('click', isTouch ? (_, d) => showLabel(d, townMap) : null);

  } catch(err) {
    statusEl.textContent = 'Could not load map.';
    console.error(err);
  }
}

// ── Tooltip & label ────────────────────────────────────
function tipContent(town, townMap) {
  const a = townMap[town];
  if (!a) return { detail: 'Not yet played', color: 'var(--parchment)' };
  const pct = Math.round((a.correct / a.seen) * 100);
  return { detail: `${pct}% accurate (${a.correct}/${a.seen} correct)`, color: pctColor(pct) };
}

function showTip(event, d, townMap) {
  const town = d.properties.TOWN;
  const { detail, color } = tipContent(town, townMap);
  document.getElementById('tip-town').textContent = town;
  document.getElementById('tip-detail').innerHTML = `<span style="color:${color}">${detail}</span>`;
  const tip = document.getElementById('map-tip');
  tip.style.display = 'block';
  tip.style.left = (event.clientX + 14) + 'px';
  tip.style.top  = (event.clientY - 10) + 'px';
}

function hideTip() {
  document.getElementById('map-tip').style.display = 'none';
}

function showLabel(d, townMap) {
  const town = d.properties.TOWN;
  const { detail, color } = tipContent(town, townMap);
  const townEl = document.getElementById('lbl-town');
  townEl.textContent = town;
  townEl.style.color = color;
  document.getElementById('lbl-detail').textContent = detail;
}

// ── Init ───────────────────────────────────────────────
const stats = loadStats();
buildSummary(stats);
buildCountyGrid(stats);
